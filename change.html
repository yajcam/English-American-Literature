        let currentQuestionIndex = 0;
        let score = 0;
        let answered = new Array(quizData.length).fill(false);
        let audioContext;

        function initAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playCorrectSound() {
            initAudio();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 800;
            gain.gain.value = 0.3;
            osc.connect(gain).connect(audioContext.destination);
            osc.start();
            setTimeout(() => osc.stop(), 180);
            setTimeout(() => {
                const osc2 = audioContext.createOscillator();
                osc2.frequency.value = 1200;
                osc2.connect(gain).connect(audioContext.destination);
                osc2.start();
                setTimeout(() => osc2.stop(), 250);
            }, 100);
        }

        function playIncorrectSound() {
            initAudio();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 280;
            gain.gain.value = 0.25;
            osc.connect(gain).connect(audioContext.destination);
            osc.start();
            setTimeout(() => osc.stop(), 450);
        }

        function loadQuestion() {
            const q = quizData[currentQuestionIndex];
            document.getElementById('current-q').textContent = q.id;
            document.getElementById('question-text').innerHTML = `<strong>${q.id}.</strong> ${q.question}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            Object.keys(q.options).forEach(letter => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `<span class="letter">${letter}</span> ${q.options[letter]}`;
                div.dataset.letter = letter;
                div.addEventListener('dblclick', () => handleSelection(letter, div));
                container.appendChild(div);
            });
            
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('btn-prev').style.display = currentQuestionIndex > 0 ? 'block' : 'none';
            updateProgress();
        }

        function handleSelection(selected, element) {
            if (answered[currentQuestionIndex]) return;
            answered[currentQuestionIndex] = true;
            
            const q = quizData[currentQuestionIndex];
            const isCorrect = selected === q.correct;
            
            if (isCorrect) {
                score++;
                playCorrectSound();
            } else {
                playIncorrectSound();
            }
            
            // Highlight options
            document.querySelectorAll('.option').forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.dataset.letter === q.correct) {
                    opt.classList.add('correct');
                }
                if (opt.dataset.letter === selected && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });
            
            // Show feedback
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `<strong>${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</strong><br><br><strong>Explanation:</strong> ${q.explanation}`;
            feedback.classList.add('show', isCorrect ? 'correct' : 'incorrect');
            
            document.getElementById('current-score').textContent = score;
        }

        function updateProgress() {
            const percent = ((currentQuestionIndex + 1) / quizData.length) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function showResults() {
            document.getElementById('quiz-body').style.display = 'none';
            const screen = document.getElementById('score-screen');
            screen.style.display = 'block';
            
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('score-circle').textContent = percentage + '%';
            document.getElementById('final-score').innerHTML = `You got <strong>${score}</strong> out of <strong>40</strong>`;
            
            const msg = document.getElementById('performance-msg');
            if (percentage >= 90) msg.textContent = "Excellent! You're a literature master! 🎉";
            else if (percentage >= 75) msg.textContent = "Very Good! Strong performance!";
            else if (percentage >= 60) msg.textContent = "Good job! Keep improving.";
            else msg.textContent = "Keep studying! Practice makes perfect.";
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            answered = new Array(quizData.length).fill(false);
            document.getElementById('quiz-body').style.display = 'block';
            document.getElementById('score-screen').style.display = 'none';
            document.getElementById('current-score').textContent = '0';
            loadQuestion();
        }

        // Start the quiz
        window.onload = loadQuestion;
    </script>
</body>
</html>
